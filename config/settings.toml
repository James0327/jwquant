# JWQuant 系统配置

[project]
name = "jwquant"     # 项目名称，用于标识当前配置所属系统
version = "0.1.0"    # 项目版本号，主要用于记录配置与代码对应关系

[broker.xtquant.stock]
# 股票账户配置
account_type = "STOCK"  # 账户类型：股票 (XTQuant account_type='STOCK')
# QMT mini 的 userdata_mini 路径；应指向本机 QMT 实际账户目录
# path = "C:\\CICCQMT\\userdata_mini"
# account_id = "8069529520"
# path = "C:\\GJ_QMT\\userdata_mini"
# account_id = "8890195341"
path = "C:\\GJ_QMT_TEST\\userdata_mini"   # 本地 QMT 股票账户目录；为空或错误时通常无法连接交易终端
account_id = "8880412630"                 # 股票资金账号；需与上面的 QMT 目录对应，敏感环境建议通过环境变量覆盖
max_retry = 5                              # 股票账户连接/订阅最大重试次数；5 表示首次失败后最多再尝试 4 次
retry_interval = 3.0                       # 股票账户连接/订阅重试间隔，单位秒；3.0 表示每次失败后等待 3 秒重试

[broker.xtquant.futures]
# 期货账户配置
account_type = "FUTURE"  # 账户类型：期货 (XTQuant account_type='FUTURE')
# QMT mini 的 userdata_mini 路径；应指向本机 QMT 实际期货账户目录
path = "C:\\CICCQMT\\userdata_mini"   # 本地 QMT 期货账户目录；需与 account_id 属于同一终端环境
account_id = "99826010"               # 期货资金账号；用于连接对应期货账户，敏感环境建议通过环境变量覆盖
max_retry = 5                          # 期货账户连接/订阅最大重试次数；5 表示首次失败后最多再尝试 4 次
retry_interval = 3.0                   # 期货账户连接/订阅重试间隔，单位秒；3.0 表示每次失败后等待 3 秒重试

[data.tushare]
token = "b8c817663f0a23e631e742a6330fbffb9e90fd720a749aed473fb888"    # Tushare Token；留空表示不启用 Tushare 数据源

[data.akshare]
enabled = true               # AkShare 数据源总开关；当前主要用于股票历史研究与补数场景
default_adjust = "none"      # AkShare 默认复权方式；系统长期仍以原始行情优先

[data.store]
# 本地数据存储配置
path = "./data"                  # 本地数据根目录；行情、因子、rocksdb 等文件都会落到这个目录下
format = "csv"               # 存储格式；csv 便于排查，sqlite 便于轻量查询，rocksdb 适合大批量 KV，hdf5 适合本地分析

[data.download]
window = "month"                 # 下载分段窗口；可选 day / month / quarter / year，month 表示按自然月分页下载
chunk_retries = 2                # 单个下载分段失败时的最大重试次数；2 表示一个窗口最多尝试 2 次
retry_interval = 1.0             # 单个下载分段的重试间隔，单位秒
resume = true                    # 是否启用断点续传；true 时会根据本地最新时间从失败分段继续下载

[data.adjust]
price_digits = 3                 # 本地 qfq/hfq 计算结果的小数保留位数；默认 3，可通过环境变量覆盖

[data.source_policy.stock.research]
daily = ["akshare", "tushare", "baostock", "xtquant"]  # 研究场景股票日线优先级；AkShare 优先，方便无 QMT 环境补数
weekly = ["akshare", "tushare", "baostock"]              # 研究场景股票周线优先级
monthly = ["akshare", "tushare", "baostock"]             # 研究场景股票月线优先级
intraday = ["xtquant"]                                     # 研究场景分钟线暂仅 XtQuant

[data.source_policy.stock.backtest]
daily = ["xtquant", "akshare", "tushare", "baostock"]   # 回测场景股票日线优先级；XtQuant 仍为默认主源
weekly = ["xtquant", "akshare", "tushare", "baostock"]  # 回测场景股票周线优先级
monthly = ["xtquant", "akshare", "tushare", "baostock"] # 回测场景股票月线优先级
intraday = ["xtquant"]                                     # 回测分钟线暂仅 XtQuant

[data.source_policy.stock.repair]
daily = ["akshare", "tushare", "baostock", "xtquant"]   # 补数场景股票日线优先级；优先低耦合外部源
weekly = ["akshare", "tushare", "baostock"]              # 补数场景股票周线优先级
monthly = ["akshare", "tushare", "baostock"]             # 补数场景股票月线优先级
intraday = ["xtquant"]                                     # 补数分钟线暂仅 XtQuant

[data.source_policy.stock.reconciliation]
primary = "xtquant"                                        # 对账场景主参考源
secondary = ["akshare", "tushare", "baostock"]           # 对账场景次参考源
daily = ["xtquant", "akshare", "tushare", "baostock"]   # 对账时如需顺序拉取的默认优先级
weekly = ["xtquant", "akshare", "tushare", "baostock"]  # 对账周线优先级
monthly = ["xtquant", "akshare", "tushare", "baostock"] # 对账月线优先级
intraday = ["xtquant"]                                     # 对账分钟线暂仅 XtQuant

[data.source_policy.futures.backtest]
daily = ["xtquant"]                                        # 期货回测当前仅 XtQuant
weekly = ["xtquant"]                                       # 期货周线当前仅 XtQuant
monthly = ["xtquant"]                                      # 期货月线当前仅 XtQuant
intraday = ["xtquant"]                                     # 期货分钟线当前仅 XtQuant

[llm]
provider = "openai"  # LLM 提供方；openai / qwen / local，需和下游调用逻辑支持的 provider 一致
api_key = ""         # LLM API Key；留空表示不在配置文件中提供，建议不要直接写入仓库配置，优先通过环境变量覆盖
model = "GPT-5.4"     # 默认模型名称；应填写对应 provider 下实际可用的模型 id

[risk]
max_position_pct = 0.5       # 单票最大仓位占比；0.2 表示单只股票最多占账户权益的 20%，1.0 表示最多占满账户权益
max_daily_drawdown = 0.05    # 单日最大回撤比例；0.05 表示当日回撤达到 5% 触发限制
max_order_amount = 100000    # 单笔最大金额，单位为账户计价货币；如 A 股通常表示 10 万元
blacklist = ["ST", "*ST"]    # 黑名单关键词

[backtest.cost]
commission_rate = 0.0003              # 回测佣金费率；按成交额比例收取，0.0003 表示万分之三，成交 10 万时佣金约 30
slippage = 0.0001                     # 回测滑点比例；0.0001 表示万分之一，买入成交价按参考价上浮 0.01%，卖出下浮 0.01%
max_order_value = 100000.0            # broker 估算单笔可下金额时使用的第一层上限；0 或负数表示不在 broker 层额外限制
futures_margin_rate = 0.12            # 期货保证金率；0.12 表示开仓时按合约名义金额的 12% 估算保证金占用
futures_contract_multiplier = 300.0   # 期货合约乘数；如沪深 300 股指期货常见为 300，盈亏和名义金额都会乘这个值

[backtest.risk]
max_total_exposure = 1.0      # 回测组合总暴露上限；1.0 表示总暴露最多等于账户权益，0.8 表示最多用到 80% 权益，0 或负数表示关闭
max_single_weight = 1.0       # 回测单标的权重上限；1.0 表示单标的最多占 100%，0.3 表示单标的最多占 30%，0 或负数表示关闭
max_futures_margin_ratio = 1.0  # 回测期货保证金占权益上限；1.0 表示保证金最多占满权益，0.5 表示最多占 50%，0 或负数表示关闭
max_holdings = 0              # 回测最大持仓标的数；0 表示关闭，3 表示最多同时持有 3 个代码
max_order_amount = 0          # 回测统一单笔下单金额上限；单位为账户计价货币，0 或负数表示关闭
stop_loss_pct = 0.0           # 回测统一固定止损比例；0.05 表示亏损达到 5% 触发退出，0 表示关闭
take_profit_pct = 0.0         # 回测统一固定止盈比例；0.1 表示盈利达到 10% 触发退出，0 表示关闭
trailing_stop_pct = 0.0       # 回测统一移动止损比例；0.08 表示从持仓最高有利价回撤 8% 触发退出，0 表示关闭
max_drawdown_pct = 0.0        # 回测统一最大回撤止损比例；0.12 表示组合从净值高点回撤 12% 触发风控退出，0 表示关闭
buy_reject_threshold_pct = 0.0  # 股票买入拦截阈值；相对昨收涨幅达到该比例后不再买入，0 表示关闭
sell_reject_threshold_pct = 0.0 # 股票卖出拦截阈值；相对昨收跌幅达到该比例后不再卖出，0 表示关闭
limit_up_pct = 0.095           # 股票涨停阈值；相对昨收涨幅达到该比例后禁止买入
limit_down_pct = 0.095         # 股票跌停阈值；相对昨收跌幅达到该比例后禁止卖出
allow_futures_long = true     # 回测是否允许期货开多；false 时会拦截 open_long 类订单
allow_futures_short = true    # 回测是否允许期货开空；false 时会拦截 open_short 类订单
conflict_policy = "priority_first"  # 多条风控规则冲突时的仲裁策略；当前仅支持 priority_first，表示按优先级数值从小到大先命中的规则优先

[backtest.risk.rule_priorities]
futures_direction = 10   # 期货方向限制优先级；数字越小优先级越高，会更早参与仲裁
no_naked_short = 10      # 裸卖空限制优先级；与上面相同，10 比 20 更早生效
max_order_amount = 20    # 单笔金额上限优先级
max_position_pct = 30    # 单标的仓位上限优先级
max_holdings = 40        # 最大持仓标的数优先级
max_total_exposure = 50  # 组合总暴露限制优先级
max_drawdown = 10        # 最大回撤止损优先级
fixed_stop_loss = 20     # 固定止损优先级
trailing_stop = 30       # 移动止损优先级
fixed_take_profit = 40   # 固定止盈优先级

[backtest.report]
dir = "reports/backtest"  # 正式回测报告目录；文件名统一为“策略名_开始日期_结束日期.html”，重复时自动追加（1），（2）
chart_mode = "full"      # 报表价格图模式：simple=收盘价折线+买卖点，full=K线图+买卖点

[execution.risk]
max_total_exposure = 1.0      # 执行前组合总暴露上限；1.0 表示不超过账户权益，0.8 表示最多占用 80% 权益，0 或负数表示关闭
max_single_weight = 1.0       # 执行前单标的权重上限；1.0 表示不限制，0.25 表示单标的最多占 25%
max_futures_margin_ratio = 1.0  # 执行前期货保证金占权益上限；1.0 表示最多等于账户权益，0.6 表示最多占 60%
max_holdings = 0              # 执行前最大持仓标的数；0 表示关闭，正整数表示允许同时持有的最大代码数
max_order_amount = 0          # 执行前统一单笔下单金额上限；单位为账户计价货币，0 或负数表示关闭
allow_futures_long = true     # 是否允许期货开多；false 时会拦截 open_long 类订单
allow_futures_short = true    # 是否允许期货开空；false 时会拦截 open_short 类订单
conflict_policy = "priority_first"  # 多条执行前风控规则冲突时的仲裁策略；当前仅支持 priority_first

# ---------------------------------------------------------------------------
# 日志配置
# ---------------------------------------------------------------------------
[log]
level = "INFO"               # 日志级别；DEBUG 最详细，INFO 为常规运行，WARNING/ERROR 逐步收紧输出
enable_file = true           # 是否输出到文件；true 时通常会按天或按运行批次写入日志目录
log_dir = "./logs"           # 日志文件目录；相对路径以项目根目录为基准
enable_json = false          # 文件日志是否使用 JSON 格式；true 更适合日志采集，false 更适合人工查看

# ---------------------------------------------------------------------------
# 通知配置
# ---------------------------------------------------------------------------
[notification]
enabled = false              # 通知总开关；false 时下面各渠道配置即使完整也不会发送
channels = ["wechat"]        # 默认启用的通知渠道列表；可选值需和下方渠道配置段对应
rate_limit_enabled = true    # 是否启用速率限制；true 时会限制单位时间内的消息发送数量
max_messages_per_minute = 10 # 每分钟最大消息数；仅在开启速率限制时生效

[notification.routing]
INFO = ["wechat"]                           # INFO 级消息默认路由到的渠道
WARNING = ["wechat", "dingtalk"]           # WARNING 级消息默认路由到的渠道
ERROR = ["wechat", "dingtalk", "email"]    # ERROR 级消息默认路由到的渠道
CRITICAL = ["wechat", "dingtalk", "email"] # CRITICAL 级消息默认路由到的渠道

[notification.wechat]
provider = "serverchan"      # 微信通知提供方；serverchan | pushplus，需与下游适配器支持的实现一致
token = ""                   # 微信通知 token；留空表示该渠道尚未配置可用凭据，建议通过环境变量或外部密钥管理提供

[notification.dingtalk]
webhook = ""                 # 钉钉机器人 webhook 地址；留空表示该渠道尚未配置，建议不要直接写入公开配置
secret = ""                  # 钉钉机器人签名密钥；部分机器人可选，留空表示不启用签名，建议通过环境变量提供

[notification.email]
smtp_server = "smtp.qq.com"  # SMTP 服务器地址；如 QQ 邮箱、企业邮箱或自建 SMTP 服务
smtp_port = 587              # SMTP 端口；587 常用于 TLS，465 常用于 SSL
username = ""                # SMTP 用户名；通常是邮箱账号，敏感环境建议通过环境变量覆盖
password = ""                # SMTP 密码或授权码；强烈建议通过环境变量提供，不要直接写入配置文件
from_addr = ""               # 发件人地址；留空时通常无法发送邮件，可与 username 相同
to_addrs = []                # 收件人列表；可填写多个邮箱地址，注意避免把真实地址提交到公共仓库
use_tls = true               # 是否启用 TLS；true 表示使用 STARTTLS 等安全连接方式

# ---------------------------------------------------------------------------
# 测试配置
# ---------------------------------------------------------------------------
[test]
# 测试流程控制
enable_login = true          # 是否启用账号登录步骤
enable_download = true       # 是否启用数据下载步骤
enable_backtest = true       # 是否启用回测执行步骤
enable_report = true         # 是否启用报表生成步骤

# 测试参数
max_retry = 5                # 登录重试最大次数
retry_interval = 3           # 重试间隔（秒）

# 目标股票配置
[test.target_stock]
code = "002229.SZ"           # 测试目标股票代码
market = "stock"             # 市场类型

# 数据下载配置
data_start_date = "2000-01-01"  # 数据下载起始日期

# 回测配置
backtest_start_date = "2020-01-01"  # 回测起始日期
backtest_end_date = "2024-12-31"    # 回测结束日期
strategy_name = "chanlun"        # 默认测试策略名称

# 回测资金配置
[test.backtest]
initial_capital = 10000   # 初始资金（元）

[test.report]
dir = "reports/manual"  # 手动测试报告目录；文件名统一为“策略名_开始日期_结束日期.html”，重复时自动追加（1），（2）
chart_mode = "simple"   # 手动测试报表价格图模式：simple=收盘价折线+买卖点，full=K线图+买卖点
