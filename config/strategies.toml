# 策略参数配置

[indicators.macd]
fast_period = 12        # MACD快线周期
slow_period = 26        # MACD慢线周期
signal_period = 9       # MACD信号线周期
divergence_window = 2   # 背离拐点窗口

[strategies.turtle]
entry_window = 20        # 入场突破窗口
exit_window = 10         # 离场突破窗口
atr_period = 20          # ATR 计算周期
risk_ratio = 0.01        # 单次风险比例

[strategies.grid]
grid_count = 10          # 网格数量
grid_spacing = 0.02      # 网格间距（百分比）
base_amount = 10000      # 每格交易金额

[strategies.rotation]
holding_count = 5        # 持仓股票数量
rebalance_days = 5       # 调仓周期（交易日）
market_cap_limit = 50    # 市值上限（亿）

[strategies.chanlun]
min_bi_length = 5        # 最小笔长度
zhongshu_count = 3       # 中枢构成笔数

[strategies.single_ma]
ma_period = 15           # 移动平均周期
min_history = 20         # 最小历史数据要求

[strategies.double_ma]
short_ma_period = 5      # 短期均线周期
long_ma_period = 10      # 长期均线周期
min_history = 20         # 最小历史数据要求

[strategies.three_ma_cross]
short_ma_period = 5      # 短期均线周期
medium_ma_period = 10    # 中期均线周期
long_ma_period = 20      # 长期均线周期
min_history = 30         # 最小历史数据要求

[strategies.macd_kdj]
# MACD参数
macd_fast = 12           # MACD快线周期
macd_slow = 26           # MACD慢线周期
macd_signal = 9          # MACD信号线周期

# KDJ参数
kdj_fastk = 9            # KDJ K周期
kdj_slowk = 3            # KDJ K平滑周期
kdj_slowd = 3            # KDJ D平滑周期

# 策略参数
min_history = 34         # 最小历史数据要求
overbought_threshold = 80 # 超买阈值

[strategies.macd_signal]
macd_fast = 12           # MACD快线周期
macd_slow = 26           # MACD慢线周期
macd_signal = 9          # MACD信号线周期
min_history = 35         # 最小历史数据要求
position_ratio = 0.9     # 开仓资金使用比例

[strategies.macd_divergence]
macd_fast = 12           # MACD快线周期
macd_slow = 26           # MACD慢线周期
macd_signal = 9          # MACD信号线周期
min_history = 35         # 最小历史数据要求
position_ratio = 0.9     # 开仓资金使用比例
